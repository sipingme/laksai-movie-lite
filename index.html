<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LibreTV Lite - 免费在线影视</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
        }
        
        .header {
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            background: linear-gradient(45deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .search-box {
            flex: 1;
            max-width: 600px;
            margin: 0 2rem;
            position: relative;
        }
        
        .search-box input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 25px;
            background: rgba(255,255,255,0.1);
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s;
        }
        
        .search-box input:focus {
            border-color: #00d4ff;
            background: rgba(255,255,255,0.15);
        }
        
        .search-box input::placeholder {
            color: rgba(255,255,255,0.5);
        }
        
        .main {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }
        
        .sources {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }
        
        .source-btn {
            padding: 0.5rem 1.5rem;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.05);
            color: #fff;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.9rem;
        }
        
        .source-btn:hover,
        .source-btn.active {
            background: linear-gradient(45deg, #00d4ff, #7b2cbf);
            border-color: transparent;
        }
        
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1.5rem;
        }
        
        .video-card {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .video-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,212,255,0.2);
        }
        
        .video-thumb {
            aspect-ratio: 2/3;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            position: relative;
        }
        
        .video-thumb::after {
            content: '▶';
            position: absolute;
            font-size: 3rem;
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .video-card:hover .video-thumb::after {
            opacity: 1;
        }
        
        .video-info {
            padding: 1rem;
        }
        
        .video-title {
            font-size: 1rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
            line-height: 1.4;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }
        
        .video-meta {
            color: rgba(255,255,255,0.6);
            font-size: 0.85rem;
            display: flex;
            gap: 1rem;
        }
        
        .loading {
            text-align: center;
            padding: 3rem;
            color: rgba(255,255,255,0.6);
        }
        
        .player-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        
        .player-modal.active {
            display: flex;
        }
        
        .player-container {
            width: 90%;
            max-width: 1200px;
            aspect-ratio: 16/9;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
        }
        
        .player-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        
        .close-btn {
            position: absolute;
            top: -40px;
            right: 0;
            background: none;
            border: none;
            color: #fff;
            font-size: 2rem;
            cursor: pointer;
        }
        
        .notice {
            background: rgba(255,193,7,0.1);
            border: 1px solid rgba(255,193,7,0.3);
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 2rem;
            text-align: center;
            color: rgba(255,255,255,0.8);
        }
        
        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                gap: 1rem;
            }
            
            .search-box {
                margin: 0;
                width: 100%;
            }
            
            .video-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                gap: 1rem;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <div class="logo">LibreTV Lite</div>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="搜索电影、电视剧..." onkeypress="handleKeyPress(event)">
            </div>
        </div>
    </header>
    
    <main class="main">
        <div class="notice">
            ⚠️ 本项目仅供学习交流，视频源来自第三方公开接口，请在遵守当地法律的前提下使用
        </div>
        
        <div class="sources">
            <button class="source-btn active" onclick="switchSource('heimuer')">黑莓影视</button>
            <button class="source-btn" onclick="switchSource('ffzy')">非凡影视</button>
            <button class="source-btn" onclick="switchSource('zuida')">最大资源</button>
            <button class="source-btn" onclick="switchSource('kuaikan')">快看影视</button>
        </div>
        
        <div id="videoList" class="video-grid">
            <div class="loading">输入关键词搜索，或点击上方视频源浏览热门内容</div>
        </div>
    </main>
    
    <div id="playerModal" class="player-modal">
        <div class="player-container">
            <button class="close-btn" onclick="closePlayer()">×</button>
            <iframe id="videoPlayer" allowfullscreen></iframe>
        </div>
    </div>

    <script>
        let currentSource = 'heimuer';
        
        const sources = {
            heimuer: {
                name: '黑莓影视',
                search: 'https://json.heimuer.xyz/api.php/provide/vod/?ac=videolist&wd={keyword}',
                detail: 'https://json.heimuer.xyz/api.php/provide/vod/?ac=videolist&ids={id}'
            },
            ffzy: {
                name: '非凡影视', 
                search: 'http://ffzy5.tv/api.php/provide/vod/?ac=videolist&wd={keyword}',
                detail: 'http://ffzy5.tv/api.php/provide/vod/?ac=videolist&ids={id}'
            },
            zuida: {
                name: '最大资源',
                search: 'http://www.zuidazy5.net/api.php/provide/vod/?ac=videolist&wd={keyword}',
                detail: 'http://www.zuidazy5.net/api.php/provide/vod/?ac=videolist&ids={id}'
            },
            kuaikan: {
                name: '快看影视',
                search: 'https://kuaikan-api.com/api.php/provide/vod/?ac=videolist&wd={keyword}',
                detail: 'https://kuaikan-api.com/api.php/provide/vod/?ac=videolist&ids={id}'
            }
        };
        
        function switchSource(source) {
            currentSource = source;
            document.querySelectorAll('.source-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            const keyword = document.getElementById('searchInput').value;
            if (keyword) {
                searchVideos(keyword);
            }
        }
        
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                searchVideos(event.target.value);
            }
        }
        
        // 代理服务列表
        const proxyServices = [
            'https://api.codetabs.com/v1/proxy?quest=',
            'https://corsproxy.io/?',
            'https://api.allorigins.win/raw?url='
        ];
        
        async function searchVideos(keyword) {
            if (!keyword.trim()) return;
            
            const videoList = document.getElementById('videoList');
            videoList.innerHTML = '<div class="loading">正在搜索 ' + sources[currentSource].name + '...</div>';
            
            const searchUrl = sources[currentSource].search.replace('{keyword}', encodeURIComponent(keyword));
            let lastError = null;
            
            // 依次尝试不同的代理服务
            for (let i = 0; i < proxyServices.length; i++) {
                try {
                    const proxyUrl = proxyServices[i];
                    const response = await fetch(proxyUrl + encodeURIComponent(searchUrl), {
                        method: 'GET',
                        headers: {
                            'Accept': 'application/json'
                        }
                    });
                    
                    if (!response.ok) {
                        throw new Error('HTTP ' + response.status);
                    }
                    
                    const jsonData = await response.json();
                    
                    if (jsonData && jsonData.list && jsonData.list.length > 0) {
                        displayVideos(jsonData.list);
                        return; // 成功，直接返回
                    } else if (jsonData && jsonData.data && jsonData.data.list) {
                        displayVideos(jsonData.data.list);
                        return;
                    } else {
                        videoList.innerHTML = '<div class="loading">未找到相关内容，请尝试：1. 更换关键词 2. 切换其他视频源</div>';
                        return;
                    }
                } catch (error) {
                    console.error('Proxy ' + (i+1) + ' failed:', error);
                    lastError = error;
                    // 继续尝试下一个代理
                }
            }
            
            // 所有代理都失败了
            console.error('All proxies failed:', lastError);
            videoList.innerHTML = '<div class="loading">搜索失败，可能原因：<br>1. 网络连接问题<br>2. 视频源暂时不可用<br>3. 请尝试切换其他视频源<br><br>错误信息：' + (lastError ? lastError.message : '未知错误') + '</div>';
        }
        
        function displayVideos(videos) {
            const videoList = document.getElementById('videoList');
            
            if (!videos || videos.length === 0) {
                videoList.innerHTML = '<div class="loading">未找到相关内容</div>';
                return;
            }
            
            videoList.innerHTML = videos.map(video => `
                <div class="video-card" onclick="playVideo('${video.vod_play_url}', '${video.vod_name}')">
                    <div class="video-thumb" style="background: linear-gradient(135deg, ${getRandomColor()} 0%, ${getRandomColor()} 100%)">
                        ${video.vod_pic ? `<img src="${video.vod_pic}" style="width:100%;height:100%;object-fit:cover;" onerror="this.style.display='none'">` : ''}
                    </div>
                    <div class="video-info">
                        <div class="video-title">${video.vod_name}</div>
                        <div class="video-meta">
                            <span>${video.type_name || '未知类型'}</span>
                            <span>${video.vod_year || ''}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        function getRandomColor() {
            const colors = ['#667eea', '#764ba2', '#f093fb', '#f5576c', '#4facfe', '#00f2fe', '#43e97b', '#38f9d7'];
            return colors[Math.floor(Math.random() * colors.length)];
        }
        
        function playVideo(playUrl, title) {
            if (!playUrl) {
                alert('暂无播放链接');
                return;
            }
            
            // 解析播放链接 (格式: 第1集$链接#第2集$链接)
            const episodes = playUrl.split('#');
            let videoUrl = '';
            
            if (episodes.length > 0) {
                const firstEpisode = episodes[0];
                const urlMatch = firstEpisode.match(/\$(.+?)(?:\||$)/);
                if (urlMatch) {
                    videoUrl = urlMatch[1];
                } else {
                    videoUrl = firstEpisode;
                }
            }
            
            if (!videoUrl) {
                alert('播放链接解析失败');
                return;
            }
            
            const modal = document.getElementById('playerModal');
            const player = document.getElementById('videoPlayer');
            
            // 使用第三方播放器解析
            player.src = `https://www.yemu.xyz/?url=${encodeURIComponent(videoUrl)}`;
            modal.classList.add('active');
        }
        
        function closePlayer() {
            const modal = document.getElementById('playerModal');
            const player = document.getElementById('videoPlayer');
            player.src = '';
            modal.classList.remove('active');
        }
        
        // 点击模态框外部关闭
        document.getElementById('playerModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closePlayer();
            }
        });
    </script>
</body>
</html>
