<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>LibreTV Lite - 免费在线影视</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
        }
        
        .header {
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            background: linear-gradient(45deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .search-box {
            flex: 1;
            max-width: 600px;
            margin: 0 2rem;
            position: relative;
        }
        
        .search-box input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 25px;
            background: rgba(255,255,255,0.1);
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s;
        }
        
        .search-box input:focus {
            border-color: #00d4ff;
            background: rgba(255,255,255,0.15);
        }
        
        .search-box input::placeholder {
            color: rgba(255,255,255,0.5);
        }
        
        .main {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }
        
        .sources {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }
        
        .source-btn {
            padding: 0.5rem 1.5rem;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.05);
            color: #fff;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.9rem;
        }
        
        .source-btn:hover,
        .source-btn.active {
            background: linear-gradient(45deg, #00d4ff, #7b2cbf);
            border-color: transparent;
        }
        
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1.5rem;
        }
        
        @media (max-width: 640px) {
            .video-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 1rem;
            }
        }
        
        @media (max-width: 480px) {
            .video-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 0.8rem;
            }
        }
        
        .video-card {
            background: rgba(255,255,255,0.06);
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(255,255,255,0.1);
            will-change: transform;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        .video-card:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 12px 40px rgba(0,212,255,0.2);
            border-color: rgba(0,212,255,0.4);
            background: rgba(255,255,255,0.08);
        }

        .video-card:active {
            transform: translateY(-2px) scale(1.01);
        }
        
        .video-thumb {
            aspect-ratio: 2/3;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f0f23 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        
        .video-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
            loading: lazy;
        }
        
        .video-card:hover .video-thumb img {
            transform: scale(1.05);
        }
        
        .video-thumb::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(to bottom, transparent 60%, rgba(0,0,0,0.8));
            z-index: 1;
        }
        
        .video-thumb::after {
            content: '▶';
            position: absolute;
            font-size: 1.5rem;
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 2;
            background: linear-gradient(135deg, #00d4ff, #7b2cbf);
            width: 56px;
            height: 56px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            padding-left: 4px;
            box-shadow: 0 4px 20px rgba(0,212,255,0.4);
        }

        .video-card:hover .video-thumb::after {
            opacity: 1;
            transform: scale(1.1);
        }
        
        .video-rating {
            position: absolute;
            top: 10px;
            right: 10px;
            background: linear-gradient(135deg, #00d4ff, #0099cc);
            color: #000;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: bold;
            z-index: 2;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        
        .video-info {
            padding: 1rem;
        }

        .video-title {
            font-size: 0.95rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            line-height: 1.4;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            min-height: 2.6rem;
            color: #fff;
        }

        .video-meta {
            color: rgba(255,255,255,0.6);
            font-size: 0.8rem;
            display: flex;
            gap: 0.6rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .video-tag {
            background: linear-gradient(135deg, rgba(0,212,255,0.2), rgba(123,44,191,0.2));
            color: #00d4ff;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            border: 1px solid rgba(0,212,255,0.2);
        }
        
        .loading {
            text-align: center;
            padding: 3rem;
            color: rgba(255,255,255,0.6);
        }
        
        .loading-spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #00d4ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 1rem;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .skeleton {
            background: linear-gradient(90deg, rgba(255,255,255,0.05) 25%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0.05) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        
        .notice {
            background: rgba(255,193,7,0.1);
            border: 1px solid rgba(255,193,7,0.3);
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 2rem;
            text-align: center;
            color: rgba(255,255,255,0.8);
        }
        
        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                gap: 1rem;
            }
            
            .search-box {
                margin: 0;
                width: 100%;
            }
            
            .video-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                gap: 1rem;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <div class="logo">LibreTV Lite</div>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="搜索电影、电视剧..." onkeypress="handleKeyPress(event)">
            </div>
        </div>
    </header>
    
    <main class="main">
        <div class="notice">
            ⚠️ 本项目仅供学习交流，视频源来自第三方公开接口，请在遵守当地法律的前提下使用
        </div>
        
        <div class="sources">
            <button class="source-btn active" onclick="switchSource('wujin')">无尽资源</button>
            <button class="source-btn" onclick="switchSource('ty')">天涯资源</button>
            <button class="source-btn" onclick="switchSource('baidu')">百度云盘</button>
            <button class="source-btn" onclick="switchSource('wolong')">卧龙资源</button>
        </div>
        
        <div id="videoList" class="video-grid">
            <div class="loading">输入关键词搜索，或点击上方视频源浏览热门内容</div>
        </div>
    </main>
    
    <script>
        let currentSource = 'wujin';
        
        const sources = {
            wujin: {
                name: '无尽资源',
                search: 'https://api.wujinapi.me/api.php/provide/vod/?ac=videolist&wd={keyword}',
                detail: 'https://api.wujinapi.me/api.php/provide/vod/?ac=videolist&ids={id}'
            },
            ty: {
                name: '天涯资源',
                search: 'https://tycbo.tycng.com/api.php/provide/vod/?ac=videolist&wd={keyword}',
                detail: 'https://tycbo.tycng.com/api.php/provide/vod/?ac=videolist&ids={id}'
            },
            baidu: {
                name: '百度云盘',
                search: 'https://api.apibdzy.com/api.php/provide/vod/?ac=videolist&wd={keyword}',
                detail: 'https://api.apibdzy.com/api.php/provide/vod/?ac=videolist&ids={id}'
            },
            wolong: {
                name: '卧龙资源',
                search: 'https://collect.wolongzyw.com/api.php/provide/vod/?ac=videolist&wd={keyword}',
                detail: 'https://collect.wolongzyw.com/api.php/provide/vod/?ac=videolist&ids={id}'
            }
        };
        
        function switchSource(source) {
            currentSource = source;
            document.querySelectorAll('.source-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            const keyword = document.getElementById('searchInput').value;
            if (keyword) {
                searchVideos(keyword);
            }
        }
        
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                searchVideos(event.target.value);
            }
        }
        
        // 代理服务列表
        const proxyServices = [
            'https://api.codetabs.com/v1/proxy?quest=',
            'https://corsproxy.io/?',
            'https://api.allorigins.win/raw?url='
        ];
        
        async function searchVideos(keyword) {
            if (!keyword.trim()) return;
            
            const videoList = document.getElementById('videoList');
            videoList.innerHTML = '<div class="loading"><div class="loading-spinner"></div><div style="margin-top:10px;">正在搜索 ' + sources[currentSource].name + '...</div></div>';
            
            const searchUrl = sources[currentSource].search.replace('{keyword}', encodeURIComponent(keyword));
            let lastError = null;
            
            // 依次尝试不同的代理服务
            for (let i = 0; i < proxyServices.length; i++) {
                try {
                    const proxyUrl = proxyServices[i];
                    const response = await fetch(proxyUrl + encodeURIComponent(searchUrl), {
                        method: 'GET',
                        headers: {
                            'Accept': 'application/json'
                        }
                    });
                    
                    if (!response.ok) {
                        throw new Error('HTTP ' + response.status);
                    }
                    
                    const jsonData = await response.json();
                    
                    if (jsonData && jsonData.list && jsonData.list.length > 0) {
                        displayVideos(jsonData.list);
                        return; // 成功，直接返回
                    } else if (jsonData && jsonData.data && jsonData.data.list) {
                        displayVideos(jsonData.data.list);
                        return;
                    } else {
                        videoList.innerHTML = '<div class="loading">未找到相关内容，请尝试：1. 更换关键词 2. 切换其他视频源</div>';
                        return;
                    }
                } catch (error) {
                    console.error('Proxy ' + (i+1) + ' failed:', error);
                    lastError = error;
                    // 继续尝试下一个代理
                }
            }
            
            // 所有代理都失败了
            console.error('All proxies failed:', lastError);
            videoList.innerHTML = '<div class="loading">搜索失败，可能原因：<br>1. 网络连接问题<br>2. 视频源暂时不可用<br>3. 请尝试切换其他视频源<br><br>错误信息：' + (lastError ? lastError.message : '未知错误') + '</div>';
        }
        
        function displayVideos(videos) {
            const videoList = document.getElementById('videoList');
            
            if (!videos || videos.length === 0) {
                videoList.innerHTML = '<div class="loading"><div class="loading-spinner"></div><div>未找到相关内容</div></div>';
                return;
            }
            
            // 使用 DocumentFragment 优化性能
            const fragment = document.createDocumentFragment();
            
            videos.forEach(video => {
                const card = document.createElement('div');
                card.className = 'video-card';
                card.onclick = () => playVideo(video.vod_play_url, video.vod_name);
                
                const isM3U8 = video.vod_play_url && video.vod_play_url.includes('m3u8');
                
                card.innerHTML = `
                    <div class="video-thumb">
                        ${video.vod_pic ? 
                            `<img src="${video.vod_pic}" alt="${video.vod_name}" loading="lazy" onerror="this.style.display='none'; this.parentElement.style.background='linear-gradient(135deg, #667eea 0%, #764ba2 100%)'">` : 
                            ''
                        }
                        ${video.vod_douban_score ? `<div class="video-rating">${video.vod_douban_score}</div>` : ''}
                    </div>
                    <div class="video-info">
                        <div class="video-title">${video.vod_name}</div>
                        <div class="video-meta">
                            ${video.vod_year ? `<span>${video.vod_year}</span>` : ''}
                            ${video.type_name ? `<span class="video-tag">${video.type_name}</span>` : ''}
                            ${isM3U8 ? '<span style="color:#00d4ff;font-size:0.7rem;">HD</span>' : ''}
                        </div>
                    </div>
                `;
                
                fragment.appendChild(card);
            });
            
            videoList.innerHTML = '';
            videoList.appendChild(fragment);
        }
        
        function getRandomColor() {
            const colors = ['#667eea', '#764ba2', '#f093fb', '#f5576c', '#4facfe', '#00f2fe', '#43e97b', '#38f9d7'];
            return colors[Math.floor(Math.random() * colors.length)];
        }
        
        function playVideo(playUrl, title) {
            if (!playUrl) {
                alert('暂无播放链接');
                return;
            }
            
            // 解析播放链接 (格式: 第1集$链接#第2集$链接)
            const episodes = playUrl.split('#');
            let videoUrl = '';
            
            if (episodes.length > 0) {
                const firstEpisode = episodes[0];
                const urlMatch = firstEpisode.match(/\$(.+?)(?:\||$)/);
                if (urlMatch) {
                    videoUrl = urlMatch[1];
                } else {
                    videoUrl = firstEpisode;
                }
            }
            
            if (!videoUrl) {
                alert('播放链接解析失败');
                return;
            }
            
            // 显示播放器弹窗
            showPlayerModal(videoUrl, title);
            
            // 添加历史记录，支持返回键
            history.pushState({player: true}, title, '#player');
        }
        
        function showPlayerModal(videoUrl, title) {
            // 移除旧的弹窗
            const oldModal = document.getElementById('playerOverlay');
            if (oldModal) oldModal.remove();
            
            // 判断视频类型
            const isM3U8 = videoUrl.toLowerCase().includes('.m3u8') || videoUrl.includes('m3u8');
            const isMP4 = videoUrl.toLowerCase().includes('.mp4');
            
            // 创建播放器弹窗
            const modal = document.createElement('div');
            modal.id = 'playerOverlay';
            modal.style.cssText = `
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: #000;
                z-index: 9999;
                display: flex;
                flex-direction: column;
            `;
            
            modal.innerHTML = `
                <div style="padding: 15px 20px; background: #1a1a2e; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0;">
                    <div style="display: flex; align-items: center; gap: 15px;">
                        <button onclick="closePlayer(true)" style="padding: 8px 15px; background: #333; border: none; color: #fff; border-radius: 4px; cursor: pointer; font-size: 14px; display: flex; align-items: center; gap: 5px;">
                            ← 返回
                        </button>
                        <span style="color: #fff; font-size: 16px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 40vw;">${title || '正在播放'}</span>
                    </div>
                    <div style="display: flex; gap: 10px; align-items: center;">
                        ${(!isM3U8 && !isMP4) ? `
                        <span style="color: #999; font-size: 12px;">线路:</span>
                        <button onclick="switchParser(0)" id="parser0" style="padding: 6px 14px; background: #00d4ff; border: none; color: #000; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: bold;">线路1</button>
                        <button onclick="switchParser(1)" id="parser1" style="padding: 6px 14px; background: #333; border: none; color: #fff; border-radius: 4px; cursor: pointer; font-size: 12px;">线路2</button>
                        <button onclick="switchParser(2)" id="parser2" style="padding: 6px 14px; background: #333; border: none; color: #fff; border-radius: 4px; cursor: pointer; font-size: 12px;">线路3</button>
                        ` : ''}
                    </div>
                </div>
                <div style="flex: 1; background: #000; display: flex; align-items: center; justify-content: center; position: relative;">
                    ${(isM3U8 || isMP4) ? `
                        <video id="nativePlayer" controls autoplay playsinline style="width: 100%; height: 100%; max-height: 100vh;">
                            <source src="${videoUrl}" type="${isM3U8 ? 'application/x-mpegURL' : 'video/mp4'}">
                            您的浏览器不支持视频播放
                        </video>
                    ` : `
                        <iframe id="parserFrame" src="" style="width: 100%; height: 100%; border: none;" allowfullscreen></iframe>
                        <div id="parserLoading" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #fff; font-size: 14px; background: rgba(0,0,0,0.8); padding: 20px; border-radius: 8px;">加载中...</div>
                    `}
                </div>
            `;
            
            document.body.appendChild(modal);
            
            // 如果是外部链接，加载解析器
            if (!isM3U8 && !isMP4) {
                window.currentVideoUrl = videoUrl;
                window.currentParser = 0;
                window.parserList = [
                    'https://jx.m3u8.tv/jiexi/?url=',
                    'https://jsap.attakids.com/?url=',
                    'https://jx.aidouer.net/?url='
                ];
                loadParser(0);
            } else {
                // 原生播放，尝试自动播放
                const video = document.getElementById('nativePlayer');
                if (video) {
                    video.play().catch(e => {
                        console.log('Auto play prevented:', e);
                    });
                }
            }
        }
        
        function switchParser(index) {
            loadParser(index);
        }
        
        function loadParser(index) {
            if (!window.currentVideoUrl) return;
            
            const frame = document.getElementById('parserFrame');
            const loading = document.getElementById('parserLoading');
            
            // 更新按钮样式
            for (let i = 0; i < 3; i++) {
                const btn = document.getElementById('parser' + i);
                if (btn) {
                    btn.style.background = i === index ? '#00d4ff' : '#333';
                    btn.style.color = i === index ? '#000' : '#fff';
                    btn.style.fontWeight = i === index ? 'bold' : 'normal';
                }
            }
            
            window.currentParser = index;
            
            // 显示加载
            if (loading) loading.style.display = 'block';
            
            // 加载解析页面
            const parserUrl = window.parserList[index] + encodeURIComponent(window.currentVideoUrl);
            frame.src = parserUrl;
            
            // 3秒后隐藏加载提示
            setTimeout(() => {
                if (loading) loading.style.display = 'none';
            }, 3000);
        }
        
        function closePlayer(fromButton = false) {
            const modal = document.getElementById('playerOverlay');
            if (modal) {
                // 停止所有视频播放
                const videos = modal.querySelectorAll('video');
                videos.forEach(v => {
                    v.pause();
                    v.src = '';
                });
                const iframes = modal.querySelectorAll('iframe');
                iframes.forEach(f => f.src = '');
                modal.remove();
            }
            window.currentVideoUrl = null;

            // 如果是点击返回按钮，需要清除 hash 但不触发 popstate
            if (fromButton && location.hash === '#player') {
                history.pushState(null, '', location.pathname + location.search);
            }
        }
        
        // ESC键关闭播放器
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closePlayer();
            }
        });
        
        // 浏览器返回键关闭播放器
        window.addEventListener('popstate', function(e) {
            const modal = document.getElementById('playerOverlay');
            if (modal) {
                closePlayer(false);
            }
        });
    </script>
</body>
</html>
