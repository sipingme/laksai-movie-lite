<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>LaksaiTV - 免费在线影视</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            color: #e0e0e0;
        }
        
        .header {
            background: #0a0a0a;
            border-bottom: 1px solid #1a1a1a;
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2rem;
            gap: 1rem;
        }

        @media (max-width: 768px) {
            .header-content {
                padding: 0 1rem;
                gap: 0.5rem;
            }
        }
        
        .logo {
            font-size: 1.8rem;
            font-weight: bold;
            background: linear-gradient(135deg, #00fa9a, #20b2aa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: 2px;
            white-space: nowrap;
        }
        
        .search-box {
            flex: 1;
            margin: 0;
            position: relative;
            width: 100%;
        }
        
        .search-box input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid #333;
            border-radius: 4px;
            background: #141414;
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s;
        }

        .search-box input:focus {
            border-color: #20b2aa;
            background: #1a1a1a;
        }

        .search-box input::placeholder {
            color: #666;
        }
        
        .main {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem 2rem;
        }

        @media (max-width: 768px) {
            .main {
                padding: 1rem;
            }
        }
        
        .sources {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.5rem;
            margin-bottom: 1rem;
            margin-top: 0.5rem;
        }

        .source-btn {
            padding: 0.5rem 0.8rem;
            border: 1px solid #333;
            background: #141414;
            color: #999;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.8rem;
            flex: 1;
            min-width: 70px;
            max-width: 120px;
        }

        @media (max-width: 480px) {
            .sources {
                gap: 0.4rem;
            }
            .source-btn {
                padding: 0.4rem 0.3rem;
                font-size: 0.7rem;
                min-width: 0;
                max-width: none;
            }
        }

        .source-btn:hover,
        .source-btn.active {
            background: linear-gradient(135deg, #00fa9a, #20b2aa);
            border-color: transparent;
            color: #fff;
        }
        
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 1.2rem;
        }

        @media (max-width: 768px) {
            .video-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 1rem;
            }
        }

        @media (max-width: 480px) {
            .video-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 0.6rem;
            }
            .video-info {
                padding: 0.5rem;
            }
            .video-title {
                font-size: 0.75rem;
                min-height: 1.9rem;
                -webkit-line-clamp: 1;
            }
            .video-meta {
                font-size: 0.65rem;
            }
        }
        
        .video-card {
            background: #141414;
            border-radius: 2px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid #222;
            will-change: transform;
        }

        .video-card:hover {
            transform: translateY(-2px);
            border-color: #20b2aa;
            box-shadow: 0 4px 20px rgba(102,126,234,0.3);
        }

        .video-card:active {
            transform: translateY(0);
        }
        
        .video-thumb {
            aspect-ratio: 2/3;
            background: #0a0a0a;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        
        .video-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
            loading: lazy;
        }
        
        .video-card:hover .video-thumb img {
            transform: scale(1.05);
        }
        
        .video-thumb::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(to bottom, transparent 60%, rgba(0,0,0,0.8));
            z-index: 1;
        }
        
        .video-thumb::after {
            content: '▶';
            position: absolute;
            font-size: 1.2rem;
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 2;
            background: linear-gradient(135deg, #00fa9a, #20b2aa);
            width: 48px;
            height: 48px;
            border-radius: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            padding-left: 3px;
        }

        .video-card:hover .video-thumb::after {
            opacity: 1;
        }

        .video-rating {
            position: absolute;
            top: 8px;
            right: 8px;
            background: linear-gradient(135deg, #00fa9a, #20b2aa);
            color: #fff;
            padding: 3px 8px;
            border-radius: 2px;
            font-size: 0.75rem;
            font-weight: bold;
            z-index: 2;
        }
        
        .video-info {
            padding: 0.75rem;
        }

        .video-title {
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 0.4rem;
            line-height: 1.3;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            min-height: 2.4rem;
            color: #fff;
        }

        .video-meta {
            color: rgba(255,255,255,0.5);
            font-size: 0.75rem;
            display: flex;
            gap: 0.4rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .video-tag {
            background: #1a1a1a;
            color: #ff6d00;
            padding: 2px 8px;
            border-radius: 2px;
            font-size: 0.7rem;
            border: 1px solid #333;
        }

        @media (max-width: 480px) {
            .video-info {
                padding: 0.6rem;
            }
            .video-title {
                font-size: 0.8rem;
                min-height: 2.1rem;
            }
            .video-meta {
                font-size: 0.7rem;
            }
            .video-tag {
                padding: 1px 6px;
                font-size: 0.65rem;
            }
        }
        
        .loading {
            text-align: center;
            padding: 3rem;
            color: rgba(255,255,255,0.6);
            grid-column: 1 / -1;
            font-size: 1rem;
        }

        @media (max-width: 480px) {
            .loading {
                padding: 2rem 1rem;
                font-size: 0.9rem;
            }
        }
        
        .loading-spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 3px solid #222;
            border-top-color: #20b2aa;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 1rem;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .skeleton {
            background: linear-gradient(90deg, rgba(255,255,255,0.05) 25%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0.05) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        
        .notice {
            background: #141414;
            border: 1px solid #333;
            padding: 1rem;
            border-radius: 2px;
            margin-bottom: 2rem;
            text-align: center;
            color: #666;
            font-size: 0.85rem;
        }

        .episode-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 12px;
            max-width: 800px;
            margin: 0 auto;
        }

        @media (max-width: 640px) {
            .episode-grid {
                grid-template-columns: repeat(4, 1fr);
                gap: 10px;
            }
        }

        @media (max-width: 480px) {
            .episode-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 8px;
            }
        }

        .episode-btn {
            padding: 12px 8px;
            background: #141414;
            border: 1px solid #333;
            border-radius: 2px;
            color: #999;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.9rem;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .episode-btn:hover {
            background: linear-gradient(135deg, #00fa9a, #20b2aa);
            border-color: transparent;
            color: #fff;
        }

        .episode-btn:active {
            transform: scale(0.98);
        }

        /* 播放器返回按钮悬停效果 */
        button[style*="background: #141414"]:hover {
            background: linear-gradient(135deg, #00fa9a, #20b2aa) !important;
            border-color: transparent !important;
            color: #fff !important;
        }
        
        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                gap: 1rem;
            }
            
            .search-box {
                margin: 0;
                width: 100%;
            }
            
            .main {
                padding: 1rem;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <div class="logo">LaksaiTV</div>
            <div class="search-box">
                <input type="text" id="laksai_searchInput" placeholder="搜索电影、电视剧..." onkeypress="laksai_handleKeyPress(event)">
            </div>
        </div>
    </header>
    
    <main class="main">
        <div class="notice">
            ⚠️ 本项目仅供学习交流，视频源来自第三方公开接口，请在遵守当地法律的前提下使用
        </div>
        
        <div class="sources">
            <button class="source-btn" onclick="laksai_switchSource('wujin')">无尽</button>
            <button class="source-btn" onclick="laksai_switchSource('ty')">天涯</button>
            <button class="source-btn" onclick="laksai_switchSource('baidu')">百度</button>
            <button class="source-btn" onclick="laksai_switchSource('wolong')">卧龙</button>
            <button class="source-btn" onclick="laksai_switchSource('lzm3u8')">量子</button>
            <button class="source-btn" onclick="laksai_switchSource('ffzy')">非凡</button>
            <button class="source-btn" onclick="laksai_switchSource('hwba')">华为</button>
            <button class="source-btn" onclick="laksai_switchSource('xlys')">新浪</button>
        </div>
        
        <div id="laksai_videoList" class="video-grid">
            <div class="loading">输入关键词搜索，或点击上方视频源浏览热门内容</div>
        </div>
    </main>
    
    <script>
        let laksai_currentSource = 'wujin';
        
        const laksai_sources = {
            wujin: {
                name: '无尽资源',
                search: 'https://api.wujinapi.me/api.php/provide/vod/?ac=videolist&wd={keyword}',
                detail: 'https://api.wujinapi.me/api.php/provide/vod/?ac=videolist&ids={id}'
            },
            ty: {
                name: '天涯资源',
                search: 'https://tycbo.tycng.com/api.php/provide/vod/?ac=videolist&wd={keyword}',
                detail: 'https://tycbo.tycng.com/api.php/provide/vod/?ac=videolist&ids={id}'
            },
            baidu: {
                name: '百度云盘',
                search: 'https://api.apibdzy.com/api.php/provide/vod/?ac=videolist&wd={keyword}',
                detail: 'https://api.apibdzy.com/api.php/provide/vod/?ac=videolist&ids={id}'
            },
            wolong: {
                name: '卧龙资源',
                search: 'https://collect.wolongzyw.com/api.php/provide/vod/?ac=videolist&wd={keyword}',
                detail: 'https://collect.wolongzyw.com/api.php/provide/vod/?ac=videolist&ids={id}'
            },
            lzm3u8: {
                name: '量子资源',
                search: 'https://cj.lziapi.com/api.php/provide/vod/?ac=videolist&wd={keyword}',
                detail: 'https://cj.lziapi.com/api.php/provide/vod/?ac=videolist&ids={id}'
            },
            ffzy: {
                name: '非凡资源',
                search: 'http://ffzy1.tv/api.php/provide/vod/?ac=videolist&wd={keyword}',
                detail: 'http://ffzy1.tv/api.php/provide/vod/?ac=videolist&ids={id}'
            },
            hwba: {
                name: '华为吧',
                search: 'https://hw8.live/api.php/provide/vod/?ac=videolist&wd={keyword}',
                detail: 'https://hw8.live/api.php/provide/vod/?ac=videolist&ids={id}'
            },
            xlys: {
                name: '新浪资源',
                search: 'https://api.xinlangapi.com/api.php/provide/vod/?ac=videolist&wd={keyword}',
                detail: 'https://api.xinlangapi.com/api.php/provide/vod/?ac=videolist&ids={id}'
            }
        };
        
        function laksai_switchSource(source) {
            laksai_currentSource = source;
            document.querySelectorAll('.source-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            const keyword = document.getElementById('searchInput').value;
            if (keyword) {
                laksai_searchVideos(keyword);
            }
        }
        
        function laksai_handleKeyPress(event) {
            if (event.key === 'Enter') {
                laksai_searchVideos(event.target.value);
            }
        }
        
        // 代理服务列表
        const laksai_proxyServices = [
            'https://api.codetabs.com/v1/proxy?quest=',
            'https://corsproxy.io/?',
            'https://api.allorigins.win/raw?url='
        ];
        
        async function laksai_searchVideos(keyword) {
            if (!keyword.trim()) return;
            
            const videoList = document.getElementById('videoList');
            videoList.innerHTML = '<div class="loading"><div class="loading-spinner"></div><div style="margin-top:10px;">正在搜索 ' + laksai_sources[currentSource].name + '...</div></div>';
            
            const searchUrl = laksai_sources[currentSource].search.replace('{keyword}', encodeURIComponent(keyword));
            let lastError = null;
            
            // 依次尝试不同的代理服务
            for (let i = 0; i < laksai_proxyServices.length; i++) {
                try {
                    const proxyUrl = laksai_proxyServices[i];
                    const response = await fetch(proxyUrl + encodeURIComponent(searchUrl), {
                        method: 'GET',
                        headers: {
                            'Accept': 'application/json'
                        }
                    });
                    
                    if (!response.ok) {
                        throw new Error('HTTP ' + response.status);
                    }
                    
                    const jsonData = await response.json();
                    
                    if (jsonData && jsonData.list && jsonData.list.length > 0) {
                        laksai_displayVideos(jsonData.list);
                        return; // 成功，直接返回
                    } else if (jsonData && jsonData.data && jsonData.data.list) {
                        laksai_displayVideos(jsonData.data.list);
                        return;
                    } else {
                        videoList.innerHTML = '<div class="loading">未找到相关内容，请尝试：1. 更换关键词 2. 切换其他视频源</div>';
                        return;
                    }
                } catch (error) {
                    console.error('Proxy ' + (i+1) + ' failed:', error);
                    lastError = error;
                    // 继续尝试下一个代理
                }
            }
            
            // 所有代理都失败了
            console.error('All proxies failed:', lastError);
            videoList.innerHTML = '<div class="loading">搜索失败，可能原因：<br>1. 网络连接问题<br>2. 视频源暂时不可用<br>3. 请尝试切换其他视频源<br><br>错误信息：' + (lastError ? lastError.message : '未知错误') + '</div>';
        }
        
        function laksai_displayVideos(videos) {
            const videoList = document.getElementById('videoList');
            
            if (!videos || videos.length === 0) {
                videoList.innerHTML = '<div class="loading"><div class="loading-spinner"></div><div>未找到相关内容</div></div>';
                return;
            }
            
            // 使用 DocumentFragment 优化性能
            const fragment = document.createDocumentFragment();
            
            videos.forEach(video => {
                const card = document.createElement('div');
                card.className = 'video-card';
                card.onclick = () => laksai_playVideo(video.vod_play_url, video.vod_name);
                
                const isM3U8 = video.vod_play_url && video.vod_play_url.includes('m3u8');
                
                card.innerHTML = `
                    <div class="video-thumb">
                        ${video.vod_pic ? 
                            `<img src="${video.vod_pic}" alt="${video.vod_name}" loading="lazy" onerror="this.style.display='none'; this.parentElement.style.background='linear-gradient(135deg, #00fa9a 0%, #20b2aa 100%)'">` : 
                            ''
                        }
                        ${video.vod_douban_score ? `<div class="video-rating">${video.vod_douban_score}</div>` : ''}
                    </div>
                    <div class="video-info">
                        <div class="video-title">${video.vod_name}</div>
                        <div class="video-meta">
                            ${video.vod_year ? `<span>${video.vod_year}</span>` : ''}
                            ${video.type_name ? `<span class="video-tag">${video.type_name}</span>` : ''}
                            ${isM3U8 ? '<span style="color:#00d4ff;font-size:0.7rem;">HD</span>' : ''}
                        </div>
                    </div>
                `;
                
                fragment.appendChild(card);
            });
            
            videoList.innerHTML = '';
            videoList.appendChild(fragment);
        }
        
        function laksai_getRandomColor() {
            const colors = ['#00fa9a', '#20b2aa', '#f093fb', '#f5576c', '#4facfe', '#00f2fe', '#43e97b', '#38f9d7'];
            return colors[Math.floor(Math.random() * colors.length)];
        }
        
        function laksai_playVideo(playUrl, title) {
            if (!playUrl) {
                alert('暂无播放链接');
                return;
            }

            console.log('Original playUrl:', playUrl.substring(0, 200));

            // 尝试多种分隔符解析播放链接
            // 格式1: 第1集$链接#第2集$链接
            // 格式2: 第1集$链接$$$第2集$链接
            // 格式3: 第1集$链接\n第2集$链接
            let episodes = [];

            if (playUrl.includes('#')) {
                episodes = playUrl.split('#');
            } else if (playUrl.includes('$$$')) {
                episodes = playUrl.split('$$$');
            } else if (playUrl.includes('\n')) {
                episodes = playUrl.split('\n');
            } else {
                // 没有分隔符，尝试按 $ 分割
                episodes = [playUrl];
            }

            episodes = episodes.filter(ep => ep.trim());
            console.log('Split episodes:', episodes.length, episodes[0]?.substring(0, 100));

            if (episodes.length === 0) {
                alert('播放链接解析失败');
                return;
            }

            // 解析每一集
            const parsedEpisodes = episodes.map((ep, index) => {
                ep = ep.trim();
                // 尝试匹配 集名$链接 格式
                const match = ep.match(/^(.+?)\$(.+)$/);
                if (match) {
                    return { name: match[1].trim(), url: match[2].trim() };
                } else if (ep.includes('$')) {
                    // 有$但格式不对，尝试简单分割
                    const parts = ep.split('$');
                    if (parts.length >= 2) {
                        return { name: parts[0].trim() || `第${index + 1}集`, url: parts[parts.length - 1].trim() };
                    }
                }
                // 没有$号，整个作为链接
                return { name: `第${index + 1}集`, url: ep };
            }).filter(ep => ep.url);

            console.log('Parsed episodes:', parsedEpisodes.length, parsedEpisodes);

            if (parsedEpisodes.length === 0) {
                alert('播放链接解析失败');
                return;
            }

            // 如果只有一集，直接播放
            if (parsedEpisodes.length === 1) {
                laksai_showPlayerModal(parsedEpisodes[0].url, title);
                history.pushState({player: true}, title, '#player');
            } else {
                // 多集显示选择界面
                laksai_showEpisodeSelector(parsedEpisodes, title);
            }
        }

        function laksai_showEpisodeSelector(episodes, title) {
            // 移除旧的弹窗
            const oldModal = document.getElementById('episodeOverlay');
            if (oldModal) oldModal.remove();

            const modal = document.createElement('div');
            modal.id = 'episodeOverlay';
            modal.style.cssText = `
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: #0a0a0a;
                z-index: 9998;
                display: flex;
                flex-direction: column;
                overflow: hidden;
            `;

            const episodesHtml = episodes.map((ep, index) => `
                <button onclick="laksai_playEpisode(${index})" class="episode-btn" data-index="${index}">
                    ${ep.name || `第${index + 1}集`}
                </button>
            `).join('');

            console.log('Generated HTML buttons:', episodes.length);

            modal.innerHTML = `
                <div style="padding: 15px 20px; background: #0a0a0a; border-bottom: 1px solid #1a1a1a; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0;">
                    <div style="display: flex; align-items: center; gap: 15px;">
                        <button onclick="laksai_closeEpisodeSelector()" style="padding: 8px 15px; background: #141414; border: 1px solid #333; color: #999; border-radius: 2px; cursor: pointer; font-size: 14px; display: flex; align-items: center; gap: 5px;">
                            ← 返回
                        </button>
                        <span style="color: #e0e0e0; font-size: 16px;">${title || '选择集数'}</span>
                        <span style="color: #666; font-size: 14px;">共 ${episodes.length} 集</span>
                    </div>
                </div>
                <div style="flex: 1; padding: 20px; overflow-y: auto;">
                    ${episodesHtml ? `<div class="episode-grid">${episodesHtml}</div>` : '<div style="color: #666; text-align: center; padding: 50px;">暂无集数信息</div>'}
                </div>
            `;

            document.body.appendChild(modal);

            // 存储集数数据
            window.laksai_currentEpisodes = episodes;
            window.laksai_currentTitle = title;

            history.pushState({episodeSelector: true}, title, '#episodes');
        }

        function laksai_playEpisode(index) {
            if (!window.laksai_currentEpisodes || !window.laksai_currentEpisodes[index]) return;

            const episode = window.laksai_currentEpisodes[index];
            window.laksai_currentEpisodeIndex = index;

            // 关闭集数选择器
            const selector = document.getElementById('episodeOverlay');
            if (selector) selector.remove();

            // 播放选中的集数
            laksai_showPlayerModal(episode.url, `${window.laksai_currentTitle} - ${episode.name}`);
            history.pushState({player: true}, window.laksai_currentTitle, '#player');
        }

        function laksai_closeEpisodeSelector() {
            const modal = document.getElementById('episodeOverlay');
            if (modal) modal.remove();
            window.laksai_currentEpisodes = null;

            if (location.hash === '#episodes') {
                history.pushState(null, '', location.pathname + location.search);
            }
        }
        
        function laksai_showPlayerModal(videoUrl, title) {
            // 移除旧的弹窗
            const oldModal = document.getElementById('playerOverlay');
            if (oldModal) oldModal.remove();
            
            // 判断视频类型
            const isM3U8 = videoUrl.toLowerCase().includes('.m3u8') || videoUrl.includes('m3u8');
            const isMP4 = videoUrl.toLowerCase().includes('.mp4');
            
            // 创建播放器弹窗
            const modal = document.createElement('div');
            modal.id = 'playerOverlay';
            modal.style.cssText = `
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: #000;
                z-index: 9999;
                display: flex;
                flex-direction: column;
            `;
            
            modal.innerHTML = `
                <div style="padding: 15px 20px; background: #0a0a0a; border-bottom: 1px solid #1a1a1a; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0;">
                    <div style="display: flex; align-items: center; gap: 15px;">
                        <button onclick="laksai_closePlayer(true)" style="padding: 8px 15px; background: #141414; border: 1px solid #333; color: #999; border-radius: 2px; cursor: pointer; font-size: 14px; display: flex; align-items: center; gap: 5px; transition: all 0.3s;">
                            ← 返回
                        </button>
                        <span style="color: #e0e0e0; font-size: 16px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 40vw;">${title || '正在播放'}</span>
                    </div>
                    <div style="display: flex; gap: 10px; align-items: center;">
                        ${(!isM3U8 && !isMP4) ? `
                        <span style="color: #666; font-size: 12px;">线路:</span>
                        <button onclick="laksai_switchParser(0)" id="laksai_parser0" style="padding: 6px 14px; background: linear-gradient(135deg, #00fa9a, #20b2aa); border: none; color: #fff; border-radius: 2px; cursor: pointer; font-size: 12px; font-weight: bold;">线路1</button>
                        <button onclick="laksai_switchParser(1)" id="laksai_parser1" style="padding: 6px 14px; background: #141414; border: 1px solid #333; color: #999; border-radius: 2px; cursor: pointer; font-size: 12px;">线路2</button>
                        <button onclick="laksai_switchParser(2)" id="laksai_parser2" style="padding: 6px 14px; background: #141414; border: 1px solid #333; color: #999; border-radius: 2px; cursor: pointer; font-size: 12px;">线路3</button>
                        ` : ''}
                    </div>
                </div>
                <div style="flex: 1; background: #000; display: flex; align-items: center; justify-content: center; position: relative;">
                    ${(isM3U8 || isMP4) ? `
                        <video id="laksai_nativePlayer" controls autoplay playsinline style="width: 100%; height: 100%; max-height: 100vh;">
                            <source src="${videoUrl}" type="${isM3U8 ? 'application/x-mpegURL' : 'video/mp4'}">
                            您的浏览器不支持视频播放
                        </video>
                    ` : `
                        <iframe id="laksai_parserFrame" src="" style="width: 100%; height: 100%; border: none;" allowfullscreen></iframe>
                        <div id="laksai_parserLoading" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #666; font-size: 14px; background: rgba(10,10,10,0.95); padding: 20px; border: 1px solid #333;">加载中...</div>
                    `}
                </div>
            `;
            
            document.body.appendChild(modal);
            
            // 如果是外部链接，加载解析器
            if (!isM3U8 && !isMP4) {
                window.laksai_currentVideoUrl = videoUrl;
                window.laksai_currentParser = 0;
                window.laksai_parserList = [
                    'https://jx.m3u8.tv/jiexi/?url=',
                    'https://jsap.attakids.com/?url=',
                    'https://jx.aidouer.net/?url='
                ];
                laksai_loadParser(0);
            } else {
                // 原生播放，尝试自动播放
                const video = document.getElementById('nativePlayer');
                if (video) {
                    video.play().catch(e => {
                        console.log('Auto play prevented:', e);
                    });
                }
            }
        }
        
        function laksai_switchParser(index) {
            laksai_loadParser(index);
        }
        
        function laksai_loadParser(index) {
            if (!window.laksai_currentVideoUrl) return;
            
            const frame = document.getElementById('parserFrame');
            const loading = document.getElementById('parserLoading');
            
            // 更新按钮样式
            for (let i = 0; i < 3; i++) {
                const btn = document.getElementById('parser' + i);
                if (btn) {
                    btn.style.background = i === index ? 'linear-gradient(135deg, #00fa9a, #20b2aa)' : '#141414';
                    btn.style.color = i === index ? '#fff' : '#999';
                    btn.style.borderColor = i === index ? 'transparent' : '#333';
                    btn.style.fontWeight = i === index ? 'bold' : 'normal';
                }
            }
            
            window.laksai_currentParser = index;
            
            // 显示加载
            if (loading) loading.style.display = 'block';
            
            // 加载解析页面
            const parserUrl = window.laksai_parserList[index] + encodeURIComponent(window.laksai_currentVideoUrl);
            frame.src = parserUrl;
            
            // 3秒后隐藏加载提示
            setTimeout(() => {
                if (loading) loading.style.display = 'none';
            }, 3000);
        }
        
        function laksai_closePlayer(fromButton = false) {
            const modal = document.getElementById('playerOverlay');
            if (modal) {
                // 停止所有视频播放
                const videos = modal.querySelectorAll('video');
                videos.forEach(v => {
                    v.pause();
                    v.src = '';
                });
                const iframes = modal.querySelectorAll('iframe');
                iframes.forEach(f => f.src = '');
                modal.remove();
            }
            window.laksai_currentVideoUrl = null;

            // 如果有多集，返回集数选择器
            if (window.laksai_currentEpisodes && window.laksai_currentEpisodes.length > 1) {
                laksai_showEpisodeSelector(window.laksai_currentEpisodes, window.laksai_currentTitle);
            } else if (fromButton && location.hash === '#player') {
                // 单集情况下，点击返回按钮清除 hash
                history.pushState(null, '', location.pathname + location.search);
            }
        }
        
        // ESC键关闭播放器/集数选择器
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                const player = document.getElementById('playerOverlay');
                const selector = document.getElementById('episodeOverlay');
                if (player) {
                    laksai_closePlayer();
                } else if (selector) {
                    laksai_closeEpisodeSelector();
                }
            }
        });

        // 浏览器返回键处理
        window.addEventListener('popstate', function(e) {
            const player = document.getElementById('playerOverlay');
            const selector = document.getElementById('episodeOverlay');
            if (player) {
                laksai_closePlayer(false);
            } else if (selector) {
                laksai_closeEpisodeSelector();
            }
        });

        // 页面加载完成后默认搜索
        window.addEventListener('DOMContentLoaded', function() {
            document.getElementById('searchInput').value = '复仇者联盟';
            laksai_searchVideos('复仇者联盟');
        });
    </script>
</body>
</html>
