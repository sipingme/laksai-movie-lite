<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>LaksaiTV - е…Қиҙ№еңЁзәҝеҪұи§Ҷ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            color: #e0e0e0;
        }
        
        .header {
            background: #0a0a0a;
            border-bottom: 1px solid #1a1a1a;
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2rem;
            gap: 1rem;
        }

        @media (max-width: 768px) {
            .header-content {
                padding: 0 1rem;
                gap: 0.5rem;
            }
        }
        
        .logo {
            font-size: 1.8rem;
            font-weight: bold;
            background: linear-gradient(135deg, #00fa9a, #20b2aa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: 2px;
            white-space: nowrap;
        }
        
        .search-box {
            flex: 1;
            margin: 0;
            position: relative;
            width: 100%;
        }
        
        .search-box input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid #333;
            border-radius: 4px;
            background: #141414;
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s;
        }

        .search-box input:focus {
            border-color: #20b2aa;
            background: #1a1a1a;
        }

        .search-box input::placeholder {
            color: #666;
        }
        
        .main {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem 2rem;
        }

        @media (max-width: 768px) {
            .main {
                padding: 1rem;
            }
        }
        
        .sources {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.5rem;
            margin-bottom: 1rem;
            margin-top: 0.5rem;
        }

        .source-btn {
            padding: 0.5rem 0.8rem;
            border: 1px solid #333;
            background: #141414;
            color: #999;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.8rem;
            flex: 1;
            min-width: 70px;
            max-width: 120px;
        }

        @media (max-width: 480px) {
            .sources {
                gap: 0.4rem;
            }
            .source-btn {
                padding: 0.4rem 0.3rem;
                font-size: 0.7rem;
                min-width: 0;
                max-width: none;
            }
        }

        .source-btn:hover,
        .source-btn.active {
            background: linear-gradient(135deg, #00fa9a, #20b2aa);
            border-color: transparent;
            color: #fff;
        }
        
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 1.2rem;
        }

        @media (max-width: 768px) {
            .video-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 1rem;
            }
        }

        @media (max-width: 480px) {
            .video-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 0.6rem;
            }
            .video-info {
                padding: 0.5rem;
            }
            .video-title {
                font-size: 0.75rem;
                min-height: 1.9rem;
                -webkit-line-clamp: 1;
            }
            .video-meta {
                font-size: 0.65rem;
            }
        }
        
        .video-card {
            background: #141414;
            border-radius: 2px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid #222;
            will-change: transform;
        }

        .video-card:hover {
            transform: translateY(-2px);
            border-color: #20b2aa;
            box-shadow: 0 4px 20px rgba(102,126,234,0.3);
        }

        .video-card:active {
            transform: translateY(0);
        }
        
        .video-thumb {
            aspect-ratio: 2/3;
            background: #0a0a0a;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        
        .video-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
            loading: lazy;
        }
        
        .video-card:hover .video-thumb img {
            transform: scale(1.05);
        }
        
        .video-thumb::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(to bottom, transparent 60%, rgba(0,0,0,0.8));
            z-index: 1;
        }
        
        .video-thumb::after {
            content: 'в–¶';
            position: absolute;
            font-size: 1.2rem;
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 2;
            background: linear-gradient(135deg, #00fa9a, #20b2aa);
            width: 48px;
            height: 48px;
            border-radius: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            padding-left: 3px;
        }

        .video-card:hover .video-thumb::after {
            opacity: 1;
        }

        .video-rating {
            position: absolute;
            top: 8px;
            right: 8px;
            background: linear-gradient(135deg, #00fa9a, #20b2aa);
            color: #fff;
            padding: 3px 8px;
            border-radius: 2px;
            font-size: 0.75rem;
            font-weight: bold;
            z-index: 2;
        }
        
        .video-info {
            padding: 0.75rem;
        }

        .video-title {
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 0.4rem;
            line-height: 1.3;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            min-height: 2.4rem;
            color: #fff;
        }

        .video-meta {
            color: rgba(255,255,255,0.5);
            font-size: 0.75rem;
            display: flex;
            gap: 0.4rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .video-tag {
            background: #1a1a1a;
            color: #ff6d00;
            padding: 2px 8px;
            border-radius: 2px;
            font-size: 0.7rem;
            border: 1px solid #333;
        }

        @media (max-width: 480px) {
            .video-info {
                padding: 0.6rem;
            }
            .video-title {
                font-size: 0.8rem;
                min-height: 2.1rem;
            }
            .video-meta {
                font-size: 0.7rem;
            }
            .video-tag {
                padding: 1px 6px;
                font-size: 0.65rem;
            }
        }
        
        .loading {
            text-align: center;
            padding: 3rem;
            color: rgba(255,255,255,0.6);
            grid-column: 1 / -1;
            font-size: 1rem;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            grid-column: 1 / -1;
        }

        @media (max-width: 480px) {
            .loading {
                padding: 2rem 1rem;
                font-size: 0.9rem;
            }
        }
        
        .loading-spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 3px solid #222;
            border-top-color: #20b2aa;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 1rem;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .skeleton {
            background: linear-gradient(90deg, rgba(255,255,255,0.05) 25%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0.05) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        
        .notice {
            background: #141414;
            border: 1px solid #333;
            padding: 1rem;
            border-radius: 2px;
            margin-bottom: 2rem;
            text-align: center;
            color: #666;
            font-size: 0.85rem;
        }

        .episode-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 12px;
            max-width: 800px;
            margin: 0 auto;
        }

        @media (max-width: 640px) {
            .episode-grid {
                grid-template-columns: repeat(4, 1fr);
                gap: 10px;
            }
        }

        @media (max-width: 480px) {
            .episode-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 8px;
            }
        }

        .episode-btn {
            padding: 12px 8px;
            background: #141414;
            border: 1px solid #333;
            border-radius: 2px;
            color: #999;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.9rem;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .episode-btn:hover {
            background: linear-gradient(135deg, #00fa9a, #20b2aa);
            border-color: transparent;
            color: #fff;
        }

        .episode-btn:active {
            transform: scale(0.98);
        }

        /* ж’ӯж”ҫеҷЁиҝ”еӣһжҢүй’®жӮ¬еҒңж•Ҳжһң */
        button[style*="background: #141414"]:hover {
            background: linear-gradient(135deg, #00fa9a, #20b2aa) !important;
            border-color: transparent !important;
            color: #fff !important;
        }
        
        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                gap: 1rem;
            }
            
            .search-box {
                margin: 0;
                width: 100%;
            }
            
            .main {
                padding: 1rem;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <div class="logo">LaksaiTV</div>
            <div class="search-box">
                <input type="text" id="laksai_searchInput" placeholder="жҗңзҙўз”өеҪұгҖҒз”өи§Ҷеү§..." onkeypress="laksai_handleKeyPress(event)">
            </div>
        </div>
    </header>
    
    <main class="main">
        <div class="notice">
            вҡ пёҸ жң¬йЎ№зӣ®д»…дҫӣеӯҰд№ дәӨжөҒпјҢи§Ҷйў‘жәҗжқҘиҮӘз¬¬дёүж–№е…¬ејҖжҺҘеҸЈпјҢиҜ·еңЁйҒөе®ҲеҪ“ең°жі•еҫӢзҡ„еүҚжҸҗдёӢдҪҝз”Ё
        </div>
        
        <div class="sources">
            <button class="source-btn active" onclick="laksai_switchSource('wujin')">ж— е°Ҫ</button>
            <button class="source-btn" onclick="laksai_switchSource('ty')">еӨ©ж¶Ҝ</button>
            <button class="source-btn" onclick="laksai_switchSource('baidu')">зҷҫеәҰ</button>
            <button class="source-btn" onclick="laksai_switchSource('wolong')">еҚ§йҫҷ</button>
            <button class="source-btn" onclick="laksai_switchSource('lzm3u8')">йҮҸеӯҗ</button>
            <button class="source-btn" onclick="laksai_switchSource('ffzy')">йқһеҮЎ</button>
            <button class="source-btn" onclick="laksai_switchSource('hwba')">еҚҺдёә</button>
            <button class="source-btn" onclick="laksai_switchSource('xlys')">ж–°жөӘ</button>
        </div>
        
        <div id="laksai_videoList" class="video-grid">
            <div class="loading">иҫ“е…Ҙе…ій”®иҜҚжҗңзҙўпјҢжҲ–зӮ№еҮ»дёҠж–№и§Ҷйў‘жәҗжөҸи§Ҳзғӯй—ЁеҶ…е®№</div>
        </div>
    </main>
    
    <script>
        let laksai_currentSource = 'wujin';
        
        const laksai_sources = {
            wujin: {
                name: 'ж— е°Ҫиө„жәҗ',
                search: 'https://api.wujinapi.me/api.php/provide/vod/?ac=videolist&wd={keyword}',
                detail: 'https://api.wujinapi.me/api.php/provide/vod/?ac=videolist&ids={id}'
            },
            ty: {
                name: 'еӨ©ж¶Ҝиө„жәҗ',
                search: 'https://tycbo.tycng.com/api.php/provide/vod/?ac=videolist&wd={keyword}',
                detail: 'https://tycbo.tycng.com/api.php/provide/vod/?ac=videolist&ids={id}'
            },
            baidu: {
                name: 'зҷҫеәҰдә‘зӣҳ',
                search: 'https://api.apibdzy.com/api.php/provide/vod/?ac=videolist&wd={keyword}',
                detail: 'https://api.apibdzy.com/api.php/provide/vod/?ac=videolist&ids={id}'
            },
            wolong: {
                name: 'еҚ§йҫҷиө„жәҗ',
                search: 'https://collect.wolongzyw.com/api.php/provide/vod/?ac=videolist&wd={keyword}',
                detail: 'https://collect.wolongzyw.com/api.php/provide/vod/?ac=videolist&ids={id}'
            },
            lzm3u8: {
                name: 'йҮҸеӯҗиө„жәҗ',
                search: 'https://cj.lziapi.com/api.php/provide/vod/?ac=videolist&wd={keyword}',
                detail: 'https://cj.lziapi.com/api.php/provide/vod/?ac=videolist&ids={id}'
            },
            ffzy: {
                name: 'йқһеҮЎиө„жәҗ',
                search: 'http://ffzy1.tv/api.php/provide/vod/?ac=videolist&wd={keyword}',
                detail: 'http://ffzy1.tv/api.php/provide/vod/?ac=videolist&ids={id}'
            },
            hwba: {
                name: 'еҚҺдёәеҗ§',
                search: 'https://hw8.live/api.php/provide/vod/?ac=videolist&wd={keyword}',
                detail: 'https://hw8.live/api.php/provide/vod/?ac=videolist&ids={id}'
            },
            xlys: {
                name: 'ж–°жөӘиө„жәҗ',
                search: 'https://api.xinlangapi.com/api.php/provide/vod/?ac=videolist&wd={keyword}',
                detail: 'https://api.xinlangapi.com/api.php/provide/vod/?ac=videolist&ids={id}'
            }
        };
        
        function laksai_switchSource(source) {
            laksai_currentSource = source;
            document.querySelectorAll('.source-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            const keyword = document.getElementById('laksai_searchInput').value;
            laksai_searchVideos(keyword || ' ');
        }
        
        function laksai_handleKeyPress(event) {
            if (event.key === 'Enter') {
                laksai_searchVideos(event.target.value);
            }
        }
        
        // д»ЈзҗҶжңҚеҠЎеҲ—иЎЁ
        const laksai_proxyServices = [
            'https://api.codetabs.com/v1/proxy?quest=',
            'https://corsproxy.io/?',
            'https://api.allorigins.win/raw?url='
        ];
        
        async function laksai_searchVideos(keyword) {
            if (!keyword.trim()) return;
            
            const laksai_videoList = document.getElementById('laksai_videoList');
            laksai_videoList.innerHTML = '<div class="loading"><div class="loading-spinner"></div><div style="margin-top:10px;">жӯЈеңЁжҗңзҙў ' + laksai_sources[laksai_currentSource].name + '...</div></div>';
            
            const searchUrl = laksai_sources[laksai_currentSource].search.replace('{keyword}', encodeURIComponent(keyword));
            let lastError = null;
            
            // дҫқж¬Ўе°қиҜ•дёҚеҗҢзҡ„д»ЈзҗҶжңҚеҠЎ
            for (let i = 0; i < laksai_proxyServices.length; i++) {
                try {
                    const proxyUrl = laksai_proxyServices[i];
                    const response = await fetch(proxyUrl + encodeURIComponent(searchUrl), {
                        method: 'GET',
                        headers: {
                            'Accept': 'application/json'
                        }
                    });
                    
                    if (!response.ok) {
                        throw new Error('HTTP ' + response.status);
                    }
                    
                    const jsonData = await response.json();
                    
                    if (jsonData && jsonData.list && jsonData.list.length > 0) {
                        laksai_displayVideos(jsonData.list);
                        return; // жҲҗеҠҹпјҢзӣҙжҺҘиҝ”еӣһ
                    } else if (jsonData && jsonData.data && jsonData.data.list) {
                        laksai_displayVideos(jsonData.data.list);
                        return;
                    } else {
                        laksai_videoList.innerHTML = '<div class="empty-state"><div style="font-size: 48px; margin-bottom: 16px;">рҹ”Қ</div><div style="color: #666; font-size: 16px;">жІЎжңүжүҫеҲ°зӣёе…іеҶ…е®№</div><div style="color: #444; font-size: 14px; margin-top: 8px;">иҜ·е°қиҜ•жӣҙжҚўе…ій”®иҜҚжҲ–еҲҮжҚўе…¶д»–иө„жәҗ</div></div>';
                        return;
                    }
                } catch (error) {
                    console.error('Proxy ' + (i+1) + ' failed:', error);
                    lastError = error;
                    // з»§з»ӯе°қиҜ•дёӢдёҖдёӘд»ЈзҗҶ
                }
            }
            
            // жүҖжңүд»ЈзҗҶйғҪеӨұиҙҘдәҶ
            laksai_videoList.innerHTML = '<div class="empty-state"><div style="font-size: 48px; margin-bottom: 16px;">рҹ“Ў</div><div style="color: #666; font-size: 16px;">жҗңзҙўжңҚеҠЎжҡӮж—¶дёҚеҸҜз”Ё</div><div style="color: #444; font-size: 14px; margin-top: 8px;">иҜ·жЈҖжҹҘзҪ‘з»ңжҲ–зЁҚеҗҺйҮҚиҜ•</div></div>';
        }
        
        function laksai_displayVideos(videos) {
            const laksai_videoList = document.getElementById('laksai_videoList');
            
            if (!videos || videos.length === 0) {
                laksai_videoList.innerHTML = '<div class="empty-state"><div style="font-size: 48px; margin-bottom: 16px;">рҹ“ӯ</div><div style="color: #666; font-size: 16px;">жІЎжңүжүҫеҲ°зӣёе…іеҶ…е®№</div><div style="color: #444; font-size: 14px; margin-top: 8px;">иҜ·е°қиҜ•жӣҙжҚўе…ій”®иҜҚжҲ–еҲҮжҚўе…¶д»–иө„жәҗ</div></div>';
                return;
            }
            
            // дҪҝз”Ё DocumentFragment дјҳеҢ–жҖ§иғҪ
            const fragment = document.createDocumentFragment();
            
            videos.forEach(video => {
                const card = document.createElement('div');
                card.className = 'video-card';
                card.onclick = () => laksai_playVideo(video.vod_play_url, video.vod_name);
                
                const isM3U8 = video.vod_play_url && video.vod_play_url.includes('m3u8');
                
                card.innerHTML = `
                    <div class="video-thumb">
                        ${video.vod_pic ? 
                            `<img src="${video.vod_pic}" alt="${video.vod_name}" loading="lazy" onerror="this.style.display='none'; this.parentElement.style.background='linear-gradient(135deg, #00fa9a 0%, #20b2aa 100%)'">` : 
                            ''
                        }
                        ${video.vod_douban_score ? `<div class="video-rating">${video.vod_douban_score}</div>` : ''}
                    </div>
                    <div class="video-info">
                        <div class="video-title">${video.vod_name}</div>
                        <div class="video-meta">
                            ${video.vod_year ? `<span>${video.vod_year}</span>` : ''}
                            ${video.type_name ? `<span class="video-tag">${video.type_name}</span>` : ''}
                            ${isM3U8 ? '<span style="color:#00d4ff;font-size:0.7rem;">HD</span>' : ''}
                        </div>
                    </div>
                `;
                
                fragment.appendChild(card);
            });
            
            laksai_videoList.innerHTML = '';
            laksai_videoList.appendChild(fragment);
        }
        
        function laksai_getRandomColor() {
            const colors = ['#00fa9a', '#20b2aa', '#f093fb', '#f5576c', '#4facfe', '#00f2fe', '#43e97b', '#38f9d7'];
            return colors[Math.floor(Math.random() * colors.length)];
        }
        
        function laksai_playVideo(playUrl, title) {
            if (!playUrl) {
                alert('жҡӮж— ж’ӯж”ҫй“ҫжҺҘ');
                return;
            }

            console.log('Original playUrl:', playUrl.substring(0, 200));

            // е°қиҜ•еӨҡз§ҚеҲҶйҡ”з¬Ұи§Јжһҗж’ӯж”ҫй“ҫжҺҘ
            // ж јејҸ1: з¬¬1йӣҶ$й“ҫжҺҘ#з¬¬2йӣҶ$й“ҫжҺҘ
            // ж јејҸ2: з¬¬1йӣҶ$й“ҫжҺҘ$$$з¬¬2йӣҶ$й“ҫжҺҘ
            // ж јејҸ3: з¬¬1йӣҶ$й“ҫжҺҘ\nз¬¬2йӣҶ$й“ҫжҺҘ
            let episodes = [];

            if (playUrl.includes('#')) {
                episodes = playUrl.split('#');
            } else if (playUrl.includes('$$$')) {
                episodes = playUrl.split('$$$');
            } else if (playUrl.includes('\n')) {
                episodes = playUrl.split('\n');
            } else {
                // жІЎжңүеҲҶйҡ”з¬ҰпјҢе°қиҜ•жҢү $ еҲҶеүІ
                episodes = [playUrl];
            }

            episodes = episodes.filter(ep => ep.trim());
            console.log('Split episodes:', episodes.length, episodes[0]?.substring(0, 100));

            if (episodes.length === 0) {
                alert('ж’ӯж”ҫй“ҫжҺҘи§ЈжһҗеӨұиҙҘ');
                return;
            }

            // и§ЈжһҗжҜҸдёҖйӣҶ
            const parsedEpisodes = episodes.map((ep, index) => {
                ep = ep.trim();
                // е°қиҜ•еҢ№й…Қ йӣҶеҗҚ$й“ҫжҺҘ ж јејҸ
                const match = ep.match(/^(.+?)\$(.+)$/);
                if (match) {
                    return { name: match[1].trim(), url: match[2].trim() };
                } else if (ep.includes('$')) {
                    // жңү$дҪҶж јејҸдёҚеҜ№пјҢе°қиҜ•з®ҖеҚ•еҲҶеүІ
                    const parts = ep.split('$');
                    if (parts.length >= 2) {
                        return { name: parts[0].trim() || `з¬¬${index + 1}йӣҶ`, url: parts[parts.length - 1].trim() };
                    }
                }
                // жІЎжңү$еҸ·пјҢж•ҙдёӘдҪңдёәй“ҫжҺҘ
                return { name: `з¬¬${index + 1}йӣҶ`, url: ep };
            }).filter(ep => ep.url);

            console.log('Parsed episodes:', parsedEpisodes.length, parsedEpisodes);

            if (parsedEpisodes.length === 0) {
                alert('ж’ӯж”ҫй“ҫжҺҘи§ЈжһҗеӨұиҙҘ');
                return;
            }

            // еҰӮжһңеҸӘжңүдёҖйӣҶпјҢзӣҙжҺҘж’ӯж”ҫ
            if (parsedEpisodes.length === 1) {
                laksai_showPlayerModal(parsedEpisodes[0].url, title);
                history.pushState({player: true}, title, '#player');
            } else {
                // еӨҡйӣҶжҳҫзӨәйҖүжӢ©з•Ңйқў
                laksai_showEpisodeSelector(parsedEpisodes, title);
            }
        }

        function laksai_showEpisodeSelector(episodes, title) {
            // з§»йҷӨж—§зҡ„еј№зӘ—
            const oldModal = document.getElementById('laksai_episodeOverlay');
            if (oldModal) oldModal.remove();

            const modal = document.createElement('div');
            modal.id = 'laksai_episodeOverlay';
            modal.style.cssText = `
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: #0a0a0a;
                z-index: 9998;
                display: flex;
                flex-direction: column;
                overflow: hidden;
            `;

            const episodesHtml = episodes.map((ep, index) => `
                <button onclick="laksai_playEpisode(${index})" class="episode-btn" data-index="${index}">
                    ${ep.name || `з¬¬${index + 1}йӣҶ`}
                </button>
            `).join('');

            console.log('Generated HTML buttons:', episodes.length);

            modal.innerHTML = `
                <div style="padding: 15px 20px; background: #0a0a0a; border-bottom: 1px solid #1a1a1a; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0;">
                    <div style="display: flex; align-items: center; gap: 15px;">
                        <button onclick="laksai_closeEpisodeSelector()" style="padding: 8px 15px; background: #141414; border: 1px solid #333; color: #999; border-radius: 2px; cursor: pointer; font-size: 14px; display: flex; align-items: center; gap: 5px;">
                            вҶҗ иҝ”еӣһ
                        </button>
                        <span style="color: #e0e0e0; font-size: 16px;">${title || 'йҖүжӢ©йӣҶж•°'}</span>
                        <span style="color: #666; font-size: 14px;">е…ұ ${episodes.length} йӣҶ</span>
                    </div>
                </div>
                <div style="flex: 1; padding: 20px; overflow-y: auto;">
                    ${episodesHtml ? `<div class="episode-grid">${episodesHtml}</div>` : '<div style="color: #666; text-align: center; padding: 50px;">жҡӮж— йӣҶж•°дҝЎжҒҜ</div>'}
                </div>
            `;

            document.body.appendChild(modal);

            // еӯҳеӮЁйӣҶж•°ж•°жҚ®
            window.laksai_currentEpisodes = episodes;
            window.laksai_currentTitle = title;

            history.pushState({episodeSelector: true}, title, '#episodes');
        }

        function laksai_playEpisode(index) {
            if (!window.laksai_currentEpisodes || !window.laksai_currentEpisodes[index]) return;

            const episode = window.laksai_currentEpisodes[index];
            window.laksai_currentEpisodeIndex = index;

            // е…ій—ӯйӣҶж•°йҖүжӢ©еҷЁ
            const selector = document.getElementById('laksai_episodeOverlay');
            if (selector) selector.remove();

            // ж’ӯж”ҫйҖүдёӯзҡ„йӣҶж•°
            laksai_showPlayerModal(episode.url, `${window.laksai_currentTitle} - ${episode.name}`);
            history.pushState({player: true}, window.laksai_currentTitle, '#player');
        }

        function laksai_closeEpisodeSelector() {
            const modal = document.getElementById('laksai_episodeOverlay');
            if (modal) modal.remove();
            window.laksai_currentEpisodes = null;

            if (location.hash === '#episodes') {
                history.pushState(null, '', location.pathname + location.search);
            }
        }
        
        function laksai_showPlayerModal(videoUrl, title) {
            // з§»йҷӨж—§зҡ„еј№зӘ—
            const oldModal = document.getElementById('laksai_playerOverlay');
            if (oldModal) oldModal.remove();
            
            // еҲӨж–ӯи§Ҷйў‘зұ»еһӢ
            const isM3U8 = videoUrl.toLowerCase().includes('.m3u8') || videoUrl.includes('m3u8');
            const isMP4 = videoUrl.toLowerCase().includes('.mp4');
            
            // еҲӣе»әж’ӯж”ҫеҷЁеј№зӘ—
            const modal = document.createElement('div');
            modal.id = 'laksai_playerOverlay';
            modal.style.cssText = `
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: #000;
                z-index: 9999;
                display: flex;
                flex-direction: column;
            `;
            
            modal.innerHTML = `
                <div style="padding: 15px 20px; background: #0a0a0a; border-bottom: 1px solid #1a1a1a; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0;">
                    <div style="display: flex; align-items: center; gap: 15px;">
                        <button onclick="laksai_closePlayer(true)" style="padding: 8px 15px; background: #141414; border: 1px solid #333; color: #999; border-radius: 2px; cursor: pointer; font-size: 14px; display: flex; align-items: center; gap: 5px; transition: all 0.3s;">
                            вҶҗ иҝ”еӣһ
                        </button>
                        <span style="color: #e0e0e0; font-size: 16px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 40vw;">${title || 'жӯЈеңЁж’ӯж”ҫ'}</span>
                    </div>
                    <div style="display: flex; gap: 10px; align-items: center;">
                        ${(!isM3U8 && !isMP4) ? `
                        <span style="color: #666; font-size: 12px;">зәҝи·Ҝ:</span>
                        <button onclick="laksai_switchParser(0)" id="laksai_parser0" style="padding: 6px 14px; background: linear-gradient(135deg, #00fa9a, #20b2aa); border: none; color: #fff; border-radius: 2px; cursor: pointer; font-size: 12px; font-weight: bold;">зәҝи·Ҝ1</button>
                        <button onclick="laksai_switchParser(1)" id="laksai_parser1" style="padding: 6px 14px; background: #141414; border: 1px solid #333; color: #999; border-radius: 2px; cursor: pointer; font-size: 12px;">зәҝи·Ҝ2</button>
                        <button onclick="laksai_switchParser(2)" id="laksai_parser2" style="padding: 6px 14px; background: #141414; border: 1px solid #333; color: #999; border-radius: 2px; cursor: pointer; font-size: 12px;">зәҝи·Ҝ3</button>
                        ` : ''}
                    </div>
                </div>
                <div style="flex: 1; background: #000; display: flex; align-items: center; justify-content: center; position: relative;">
                    ${(isM3U8 || isMP4) ? `
                        <video id="laksai_nativePlayer" controls autoplay playsinline style="width: 100%; height: 100%; max-height: 100vh;">
                            <source src="${videoUrl}" type="${isM3U8 ? 'application/x-mpegURL' : 'video/mp4'}">
                            жӮЁзҡ„жөҸи§ҲеҷЁдёҚж”ҜжҢҒи§Ҷйў‘ж’ӯж”ҫ
                        </video>
                    ` : `
                        <iframe id="laksai_parserFrame" src="" style="width: 100%; height: 100%; border: none;" allowfullscreen></iframe>
                        <div id="laksai_parserLoading" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #666; font-size: 14px; background: rgba(10,10,10,0.95); padding: 20px; border: 1px solid #333;">еҠ иҪҪдёӯ...</div>
                    `}
                </div>
            `;
            
            document.body.appendChild(modal);
            
            // еҰӮжһңжҳҜеӨ–йғЁй“ҫжҺҘпјҢеҠ иҪҪи§ЈжһҗеҷЁ
            if (!isM3U8 && !isMP4) {
                window.laksai_currentVideoUrl = videoUrl;
                window.laksai_currentParser = 0;
                window.laksai_parserList = [
                    'https://jx.m3u8.tv/jiexi/?url=',
                    'https://jsap.attakids.com/?url=',
                    'https://jx.aidouer.net/?url='
                ];
                laksai_loadParser(0);
            } else {
                // еҺҹз”ҹж’ӯж”ҫпјҢе°қиҜ•иҮӘеҠЁж’ӯж”ҫ
                const video = document.getElementById('nativePlayer');
                if (video) {
                    video.play().catch(e => {
                        console.log('Auto play prevented:', e);
                    });
                }
            }
        }
        
        function laksai_switchParser(index) {
            laksai_loadParser(index);
        }
        
        function laksai_loadParser(index) {
            if (!window.laksai_currentVideoUrl) return;
            
            const frame = document.getElementById('parserFrame');
            const loading = document.getElementById('parserLoading');
            
            // жӣҙж–°жҢүй’®ж ·ејҸ
            for (let i = 0; i < 3; i++) {
                const btn = document.getElementById('parser' + i);
                if (btn) {
                    btn.style.background = i === index ? 'linear-gradient(135deg, #00fa9a, #20b2aa)' : '#141414';
                    btn.style.color = i === index ? '#fff' : '#999';
                    btn.style.borderColor = i === index ? 'transparent' : '#333';
                    btn.style.fontWeight = i === index ? 'bold' : 'normal';
                }
            }
            
            window.laksai_currentParser = index;
            
            // жҳҫзӨәеҠ иҪҪ
            if (loading) loading.style.display = 'block';
            
            // еҠ иҪҪи§ЈжһҗйЎөйқў
            const parserUrl = window.laksai_parserList[index] + encodeURIComponent(window.laksai_currentVideoUrl);
            frame.src = parserUrl;
            
            // 3з§’еҗҺйҡҗи—ҸеҠ иҪҪжҸҗзӨә
            setTimeout(() => {
                if (loading) loading.style.display = 'none';
            }, 3000);
        }
        
        function laksai_closePlayer(fromButton = false) {
            const modal = document.getElementById('laksai_playerOverlay');
            if (modal) {
                // еҒңжӯўжүҖжңүи§Ҷйў‘ж’ӯж”ҫ
                const videos = modal.querySelectorAll('video');
                videos.forEach(v => {
                    v.pause();
                    v.src = '';
                });
                const iframes = modal.querySelectorAll('iframe');
                iframes.forEach(f => f.src = '');
                modal.remove();
            }
            window.laksai_currentVideoUrl = null;

            // еҰӮжһңжңүеӨҡйӣҶпјҢиҝ”еӣһйӣҶж•°йҖүжӢ©еҷЁ
            if (window.laksai_currentEpisodes && window.laksai_currentEpisodes.length > 1) {
                laksai_showEpisodeSelector(window.laksai_currentEpisodes, window.laksai_currentTitle);
            } else if (fromButton && location.hash === '#player') {
                // еҚ•йӣҶжғ…еҶөдёӢпјҢзӮ№еҮ»иҝ”еӣһжҢүй’®жё…йҷӨ hash
                history.pushState(null, '', location.pathname + location.search);
            }
        }
        
        // ESCй”®е…ій—ӯж’ӯж”ҫеҷЁ/йӣҶж•°йҖүжӢ©еҷЁ
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                const player = document.getElementById('laksai_playerOverlay');
                const selector = document.getElementById('laksai_episodeOverlay');
                if (player) {
                    laksai_closePlayer();
                } else if (selector) {
                    laksai_closeEpisodeSelector();
                }
            }
        });

        // жөҸи§ҲеҷЁиҝ”еӣһй”®еӨ„зҗҶ
        window.addEventListener('popstate', function(e) {
            const player = document.getElementById('laksai_playerOverlay');
            const selector = document.getElementById('laksai_episodeOverlay');
            if (player) {
                laksai_closePlayer(false);
            } else if (selector) {
                laksai_closeEpisodeSelector();
            }
        });

        // йЎөйқўеҠ иҪҪе®ҢжҲҗеҗҺй»ҳи®ӨйҖүдёӯз¬¬дёҖдёӘиө„жәҗе№¶жҗңзҙў
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('laksai_searchInput').value = 'еӨҚд»ҮиҖ…иҒ”зӣҹ';
            // й»ҳи®Өз¬¬дёҖдёӘжҢүй’®е·Із»ҸжҳҜactive
            setTimeout(function() {
                laksai_searchVideos('еӨҚд»ҮиҖ…иҒ”зӣҹ');
            }, 100);
        });
    </script>
</body>
</html>
